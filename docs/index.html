<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Python Learn | 个人学习站点</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Python Learn Docsify 个人学习站点">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@latest/lib/themes/vue.css">

  <style>
    :root {
      --dark-bg: #1a1a1a;
      --dark-text: #c4c4c4;
      --dark-sidebar: #141414;
      --dark-code-bg: #2b2b2b;
      --dark-border: #333;
      --theme-color: #42b983;
    }

    .sidebar-toggle-btn {
      cursor: pointer;
      display: block;
      text-align: center;
      padding: 10px 0;
      margin: 0 15px 10px 15px;
      font-weight: bold;
      font-size: 14px;
      border-radius: 4px;
      background-color: rgba(0,0,0,0.05);
      color: #505d6b;
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .sidebar-toggle-btn:hover {
      background-color: var(--theme-color);
      color: #fff;
    }

    body.dark-mode {
      background-color: var(--dark-bg);
      color: var(--dark-text);
    }

    body.dark-mode .sidebar {
      background-color: var(--dark-sidebar);
      border-right: 1px solid var(--dark-border);
      color: var(--dark-text);
    }

    body.dark-mode .sidebar-nav li a {
      color: #999;
    }

    body.dark-mode .sidebar-nav li.active > a {
      color: var(--theme-color);
      border-right: 2px solid var(--theme-color);
    }

    body.dark-mode pre,
    body.dark-mode code {
      background-color: var(--dark-code-bg) !important;
      color: #e0e0e0 !important;
    }

    body.dark-mode .markdown-section code {
      color: #f08d49 !important;
      background-color: rgba(255,255,255,0.1) !important;
    }

    body.dark-mode h1,
    body.dark-mode h2,
    body.dark-mode h3,
    body.dark-mode h4 {
      color: #e0e0e0;
    }

    body.dark-mode blockquote {
      color: #999;
      background: rgba(255,255,255,0.05);
      border-left-color: var(--theme-color);
    }

    body.dark-mode .markdown-section tr:nth-child(2n) {
      background-color: rgba(255,255,255,0.03);
    }

    body.dark-mode .markdown-section td,
    body.dark-mode .markdown-section th {
      border-color: var(--dark-border);
    }

    body.dark-mode .sidebar-toggle-btn {
      background-color: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid #444;
    }
  </style>
</head>

<body>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: 'Python Learn',
      homepage: 'README.md',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索笔记内容',
        noData: '未找到相关内容',
        depth: 3
      },
      pagination: {
        previousText: '上一节',
        nextText: '下一节'
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            const sidebar = document.querySelector('.sidebar-nav');
            if (!sidebar || document.querySelector('.sidebar-toggle-btn')) return;

            const btn = document.createElement('div');
            btn.className = 'sidebar-toggle-btn';

            const savedTheme = localStorage.getItem('theme-mode');
            if (savedTheme === 'dark') {
              document.body.classList.add('dark-mode');
              btn.textContent = '🌙 Switch to Light';
            } else {
              btn.textContent = '☀️ Switch to Dark';
            }

            btn.onclick = function() {
              document.body.classList.toggle('dark-mode');
              const isDark = document.body.classList.contains('dark-mode');
              localStorage.setItem('theme-mode', isDark ? 'dark' : 'light');
              btn.textContent = isDark ? '🌙 Switch to Light' : '☀️ Switch to Dark';
            };

            sidebar.insertBefore(btn, sidebar.firstChild);
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-bash.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-python.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
